<!doctype html>
<html lang=en>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script type="text/javascript">

	</script>
	<style>
	body {
		margin:0px;
	}
	canvas {
		-webkit-touch-callout: none;
		-webkit-text-size-adjust: none;
		-webkit-user-select: none;
	}
	</style>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/3.6.95/css/materialdesignicons.css" rel="stylesheet">
	<link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

	<script type="text/javascript" src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
	<script type="text/javascript" src="../dist/jquery.drawr.combined.js"></script>

</head>
<body>

<div id="drawr-container3" style="width:350px;height:300px;border:2px dotted gray;margin:20px;">
	<canvas class="demo-canvas drawr-test3"></canvas>
</div>

<!--<input type="text" id="undolevel" value="0"/><button onclick='$("#drawr-container3 .demo-canvas").drawr("debug_undo",$("#undolevel").val());'>show undo stack</button>-->

<script type="text/javascript">

	window.addEventListener("contextmenu", function(evt){evt.preventDefault();return false;});//for demo purposes, context menus break interactivity, so.

	var width = $("#drawr-container3").width()/2;
	var height = $("#drawr-container3").height()/2;

	$("#drawr-container3 .demo-canvas").drawr({ "enable_transparency" : true, canvas_width: width, canvas_height: height });

	$("#drawr-container3 .demo-canvas").drawr("start");

	$("#drawr-container3 .demo-canvas").drawr("zoom",2);
	$("#drawr-container3 .demo-canvas").drawr("center");

</script>

</body>
</html>
